name: Build and deploy LaTeX PDF

on:
  push:
    paths:
      - 'wiki-guide/**.tex'
  workflow_dispatch:
jobs:
  latex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: First XeLaTeX pass
        working-directory: wiki-guide
        run: xelatex -interaction=nonstopmode main.tex

      - name: Debug glossary files
        working-directory: wiki-guide
        run: |
          ls -lah
          ls -lah *.tl* *.gl* *.ac* || true

      - name: Build glossaries
        working-directory: wiki-guide
        run: makeglossaries main

      - name: Final XeLaTeX pass
        working-directory: wiki-guide
        run: |
          xelatex -interaction=nonstopmode main.tex
          xelatex -interaction=nonstopmode main.tex

      - name: Copy PDF to docs
        run: |
          mkdir -p docs
          cp wiki-guide/main.pdf docs/wiki-guide.pdf
      - name: Commit PDF
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git pull
          git add docs/wiki-guide.pdf
          git diff --cached --quiet || git commit -m "Update PDF"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs

